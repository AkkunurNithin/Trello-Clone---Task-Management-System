<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Clone - Task Management System</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Assests/favicon.png">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- ================= Sidebar ================= -->
    <aside class="sidebar">

        <div class="logo">
            <h2>Trello Clone</h2>
        </div>

        <button id="addBoardBtn">
            <i class="fa-solid fa-plus"></i>
            New Board
        </button>

        <div class="boards-list">
            <!-- Boards will be rendered here -->
        </div>

    </aside>


    <!-- ================= Main ================= -->
    <main class="main-content">

        <!-- Header -->
       <header>

    <div class="header-left">
        <h1 id="boardTitle">Daily Do's</h1>
    </div>

    <div class="header-right">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search tasks...">

        <button id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>

    </div>

</header>


        <!-- Board Area -->
        <section class="board-container">

            <!-- Todo -->
            <div class="list">

                <div class="list-header">
                    <h3>Todo</h3>
                    <button class="addCardBtn">+</button>
                </div>

                <div class="cards">
                    <!-- Cards -->
                </div>

            </div>


            <!-- Doing -->
            <div class="list">

                <div class="list-header">
                    <h3>Doing</h3>
                    <button class="addCardBtn">+</button>
                </div>

                <div class="cards"></div>

            </div>


            <!-- Done -->
            <div class="list">

                <div class="list-header">
                    <h3>Done</h3>
                    <button class="addCardBtn">+</button>
                </div>

                <div class="cards"></div>

            </div>


            <!-- Add List -->
            <div class="add-list">
                <button id="addListBtn">
                    + Add New List
                </button>
            </div>

        </section>

    </main>


    <!-- ================= Add Board Modal ================= -->

    <div class="modal" id="boardModal">

        <div class="modal-content">

            <h2>Create Board</h2>

            <input
                type="text"
                id="boardName"
                placeholder="Board Name">

            <div class="modal-buttons">
                <button id="createBoard">
                    Create
                </button>

                <button id="closeBoardModal">
                    Cancel
                </button>
            </div>

        </div>

    </div>


    <!-- ================= Add List Modal ================= -->

    <div class="modal" id="listModal">

        <div class="modal-content">

            <h2>Create List</h2>

            <input
                type="text"
                id="listName"
                placeholder="List Name">

            <div class="modal-buttons">
                <button id="createList">
                    Create
                </button>

                <button id="closeListModal">
                    Cancel
                </button>
            </div>

        </div>

    </div>


    <!-- ================= Add Card Modal ================= -->

    <div class="modal" id="cardModal">

        <div class="modal-content">

            <h2>Create Task</h2>

            <input
                type="text"
                id="cardTitle"
                placeholder="Task Title">

            <textarea
                id="cardDescription"
                placeholder="Description"></textarea>

            <input
                type="date"
                id="dueDate">

            <select id="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <div class="modal-buttons">
                <button id="createCard">
                    Add Task
                </button>

                <button id="closeCardModal">
                    Cancel
                </button>
            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/board.js"></script>
    <script src="js/list.js"></script>
    <script src="js/card.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/search.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
